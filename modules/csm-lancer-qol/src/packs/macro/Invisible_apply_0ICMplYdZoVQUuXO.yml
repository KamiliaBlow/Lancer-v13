img: systems/lancer/assets/icons/white/status_invisible.svg
command: |-
  const invisibleEffect = [
      {
          filterType: "liquid",
          filterId: "invisible",
          color: 0x20AAEE,
          time: 0,
          blend: 8,
          intensity: 4,
          spectral: true,
          scale: 0.9,
          animated:
          {
              time:
              {
                  active: true,
                  speed: 0.0010,
                  animType: "move"
              },
              color:
              {
                  active: true,
                  loopDuration: 6000,
                  animType: "colorOscillation",
                  val1: 0xFFFFFF,
                  val2: 0x00AAFF
              }
          }
      }
  ];
  // If the effect does not exist, apply it.
  if (!TokenMagic.hasFilterId(token, `invisible`)) {
    await token.TMFXaddUpdateFilters(invisibleEffect);
  }
