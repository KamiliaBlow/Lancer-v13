name: Overshield.apply
type: script
scope: global
author: 4QXZHxEZSgaUgcDx
img: icons/svg/shield.svg
command: |-
  new Sequence()
      .effect()
          .file("jb2a.shield.01.intro.blue")
          .attachTo(token)
          .scaleToObject(1.8, { uniform: true, considerTokenScale: true })
          .waitUntilFinished(-500)
      .effect()
          .file("jb2a.shield.01.loop.blue")
          .attachTo(token)
          .scaleToObject(1.8, { uniform: true, considerTokenScale: true })
          .persist()
          .name(`Shield-${token.id}`)
          .fadeIn(300)
          .fadeOut(300)
          .extraEndDuration(800)
      .play()
