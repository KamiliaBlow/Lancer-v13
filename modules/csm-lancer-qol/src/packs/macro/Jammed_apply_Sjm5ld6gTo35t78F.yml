command: |-
  const jammedEffect = [
      {
          filterType: "electric",
          filterId: "jammed",
          color: 0xFFFFFF,
          time: 0,
          blend: 1,
          intensity: 5,
          animated:
          {
              time:
              {
                  active: true,
                  speed: 0.0020,
                  animType: "move"
              }
          }
      }
  ];
  // If the effect does not exist, apply it.
  if (!TokenMagic.hasFilterId(token, `jammed`)) {
    await token.TMFXaddUpdateFilters(jammedEffect);
  }
